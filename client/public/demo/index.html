@layer base {
  *,
  ::after,
  ::before,
  ::backdrop,
  ::file-selector-button {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    border: 0 solid;
  }
  html,
  :host {
    line-height: 1.5;
    -webkit-text-size-adjust: 100%;
    tab-size: 4;
    font-family: --theme(--default-font-family, ui-sans-serif, system-ui, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji");
    font-feature-settings: --theme(--default-font-feature-settings, normal);
    font-variation-settings: --theme(--default-font-variation-settings, normal);
    -webkit-tap-highlight-color: transparent;
  }
  hr {
    height: 0;
    color: inherit;
    border-top-width: 1px;
  }
  abbr:where([title]) {
    -webkit-text-decoration: underline dotted;
    text-decoration: underline dotted;
  }
  h1,
  h2,
  h3,
  h4,
  h5,
  h6 {
    font-size: inherit;
    font-weight: inherit;
  }
  a {
    color: inherit;
    -webkit-text-decoration: inherit;
    text-decoration: inherit;
  }
  b,
  strong {
    font-weight: bolder;
  }
  code,
  kbd,
  samp,
  pre {
    font-family: --theme(--default-mono-font-family, ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace);
    font-feature-settings: --theme(--default-mono-font-feature-settings, normal);
    font-variation-settings: --theme(--default-mono-font-variation-settings, normal);
    font-size: 1em;
  }
  small {
    font-size: 80%;
  }
  sub,
  sup {
    font-size: 75%;
    line-height: 0;
    position: relative;
    vertical-align: baseline;
  }
  sub {
    bottom: -0.25em;
  }
  sup {
    top: -0.5em;
  }
  table {
    text-indent: 0;
    border-color: inherit;
    border-collapse: collapse;
  }
  :-moz-focusring {
    outline: auto;
  }
  progress {
    vertical-align: baseline;
  }
  summary {
    display: list-item;
  }
  ol,
  ul,
  menu {
    list-style: none;
  }
  img,
  svg,
  video,
  canvas,
  audio,
  iframe,
  embed,
  object {
    display: block;
    vertical-align: middle;
  }
  img,
  video {
    max-width: 100%;
    height: auto;
  }
  button,
  input,
  select,
  optgroup,
  textarea,
  ::file-selector-button {
    font: inherit;
    font-feature-settings: inherit;
    font-variation-settings: inherit;
    letter-spacing: inherit;
    color: inherit;
    border-radius: 0;
    background-color: transparent;
    opacity: 1;
  }
  :where(select:is([multiple], [size])) optgroup {
    font-weight: bolder;
  }
  :where(select:is([multiple], [size])) optgroup option {
    padding-inline-start: 20px;
  }
  ::file-selector-button {
    margin-inline-end: 4px;
  }
  ::placeholder {
    opacity: 1;
  }
  @supports (not (-webkit-appearance: -apple-pay-button)) or (contain-intrinsic-size: 1px) {
    ::placeholder {
      color: color-mix(in oklab, currentcolor 50%, transparent);
    }
  }
  textarea {
    resize: vertical;
  }
  ::-webkit-search-decoration {
    -webkit-appearance: none;
  }
  ::-webkit-date-and-time-value {
    min-height: 1lh;
    text-align: inherit;
  }
  ::-webkit-datetime-edit {
    display: inline-flex;
  }
  ::-webkit-datetime-edit-fields-wrapper {
    padding: 0;
  }
  ::-webkit-datetime-edit,
  ::-webkit-datetime-edit-year-field,
  ::-webkit-datetime-edit-month-field,
  ::-webkit-datetime-edit-day-field,
  ::-webkit-datetime-edit-hour-field,
  ::-webkit-datetime-edit-minute-field,
  ::-webkit-datetime-edit-second-field,
  ::-webkit-datetime-edit-millisecond-field,
  ::-webkit-datetime-edit-meridiem-field {
    padding-block: 0;
  }
  ::-webkit-calendar-picker-indicator {
    line-height: 1;
  }
  :-moz-ui-invalid {
    box-shadow: none;
  }
  button,
  input:where([type=button], [type=reset], [type=submit]),
  ::file-selector-button {
    appearance: button;
  }
  ::-webkit-inner-spin-button,
  ::-webkit-outer-spin-button {
    height: auto;
  }
  [hidden]:where(:not([hidden=until-found])) {
    display: none !important;
  }
}
@layer utilities {
  @tailwind utilities;
}

body:has(#knowledge-base) .demo-duration {

  filter: brightness(0) invert(1) contrast(0.94);

.kb-convergence-beat {
  isolation: isolate;
  overflow: hidden;
  color: #edf3ff;
  background:
    radial-gradient(
      circle at 72% 52%,
      rgba(105, 92, 255, 0.24),
      transparent 34%),
    radial-gradient(
      circle at 19% 82%,
      rgba(38, 162, 255, 0.14),
      transparent 30%),
    linear-gradient(
      132deg,
      #030713 0%,
      #071326 50%,
      #09091d 100%);
}
.kb-convergence-beat::before,
.kb-convergence-beat::after {
  position: absolute;
  z-index: -1;
  border-radius: 50%;
  filter: blur(1px);
  content: "";
}
.kb-convergence-beat::before {
  top: -24%;
  right: 5%;
  width: min(54vw, 760px);
  aspect-ratio: 1;
  border: 1px solid rgba(140, 171, 255, 0.1);
  box-shadow: 0 0 0 100px rgba(71, 92, 214, 0.025), 0 0 0 220px rgba(71, 92, 214, 0.018);
}
.kb-convergence-beat::after {
  bottom: -28%;
  left: 29%;
  width: min(34vw, 480px);
  aspect-ratio: 1;
  background:
    radial-gradient(
      circle,
      rgba(73, 140, 255, 0.15),
      transparent 68%);
}
.kb-convergence-beat .beat-meta {
  position: relative;
  z-index: 2;
}
.kb-convergence-beat .beat-meta p,
.kb-convergence-beat .beat-meta time {
  color: rgba(215, 226, 255, 0.56);
}
.kb-singularity {
  position: relative;
  z-index: 1;
  width: min(100%, 1120px);
  flex: 1;
  min-height: 0;
  display: grid;
  grid-template-columns: minmax(290px, 0.9fr) minmax(440px, 1.1fr);
  align-items: center;
  gap: clamp(30px, 5vw, 82px);
  margin: 0 auto;
}
.kb-singularity-copy {
  max-width: 470px;
  display: grid;
  gap: 18px;
}
.kb-singularity-kicker {
  display: flex;
  align-items: center;
  gap: 9px;
  margin: 0;
  color: #b9c9ff;
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 720;
  letter-spacing: 0.16em;
  text-transform: uppercase;
}
.kb-singularity-kicker span {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #7cc7ff;
  box-shadow: 0 0 0 5px rgba(124, 199, 255, 0.13), 0 0 18px rgba(124, 199, 255, 0.84);
}
.kb-singularity-copy h1 {
  max-width: 480px;
  margin: 0;
  color: #f7f9ff;
  font-family: var(--serif);
  font-size: clamp(45px, 5vw, 72px);
  font-weight: 430;
  letter-spacing: -0.055em;
  line-height: 0.94;
  text-wrap: balance;
}
.kb-singularity-summary {
  max-width: 390px;
  margin: 0;
  color: rgba(220, 229, 252, 0.72);
  font-size: 13px;
  line-height: 1.62;
}
.kb-singularity-promise {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.kb-singularity-promise span {
  padding: 7px 9px;
  color: rgba(225, 234, 255, 0.78);
  border: 1px solid rgba(163, 183, 255, 0.18);
  border-radius: 999px;
  background: rgba(119, 145, 255, 0.08);
  font-family: var(--mono);
  font-size: 7px;
  font-weight: 730;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.kb-orbit-stage {
  position: relative;
  width: min(100%, 540px);
  aspect-ratio: 1;
  justify-self: end;
}
.kb-star-field {
  position: absolute;
  inset: 7%;
  pointer-events: none;
}
.kb-star-field i {
  position: absolute;
  width: 2px;
  height: 2px;
  border-radius: 50%;
  background: rgba(227, 237, 255, 0.82);
  box-shadow: 0 0 10px rgba(147, 194, 255, 0.9);
  animation: kb-star-drift 3.8s ease-in-out infinite alternate;
}
.kb-star-field i:nth-child(1) {
  top: 8%;
  left: 31%;
}
.kb-star-field i:nth-child(2) {
  top: 21%;
  right: 13%;
  animation-delay: -1.8s;
}
.kb-star-field i:nth-child(3) {
  top: 58%;
  left: 8%;
  animation-delay: -2.5s;
}
.kb-star-field i:nth-child(4) {
  right: 9%;
  bottom: 25%;
  animation-delay: -0.6s;
}
.kb-star-field i:nth-child(5) {
  bottom: 10%;
  left: 35%;
  animation-delay: -3.2s;
}
.kb-star-field i:nth-child(6) {
  top: 37%;
  left: 19%;
  animation-delay: -1.1s;
}
.kb-star-field i:nth-child(7) {
  top: 12%;
  left: 61%;
  animation-delay: -2.1s;
}
.kb-star-field i:nth-child(8) {
  right: 29%;
  bottom: 8%;
  animation-delay: -0.2s;
}
.kb-orbit-ring {
  position: absolute;
  top: 50%;
  left: 50%;
  border: 1px solid rgba(156, 180, 255, 0.17);
  border-radius: 50%;
  pointer-events: none;
  transform: translate(-50%, -50%) rotate(-16deg);
}
.kb-orbit-ring::after {
  position: absolute;
  top: -3px;
  left: 49%;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: #91c5ff;
  box-shadow: 0 0 13px #91c5ff;
  content: "";
}
.kb-orbit-ring--outer {
  width: 88%;
  height: 54%;
  animation: kb-orbit-rotate 14s linear infinite;
}
.kb-orbit-ring--inner {
  width: 60%;
  height: 88%;
  border-color: rgba(158, 130, 255, 0.13);
  animation: kb-orbit-rotate 11s linear infinite reverse;
}
.kb-context-signal {
  position: absolute;
  z-index: 3;
  display: flex;
  align-items: center;
  gap: 8px;
  max-width: 152px;
  padding: 8px 10px 8px 8px;
  color: rgba(216, 228, 255, 0.8);
  border: 1px solid rgba(157, 181, 255, 0.15);
  border-radius: 13px;
  background: rgba(8, 19, 43, 0.7);
  box-shadow: 0 11px 28px rgba(0, 0, 0, 0.22);
  backdrop-filter: blur(10px);
  cursor: pointer;
  text-align: left;
  transition:
    border-color 180ms ease,
    background 180ms ease,
    box-shadow 180ms ease,
    transform 180ms ease;
}
.kb-context-signal:hover,
.kb-context-signal:focus-visible,
.kb-context-signal.is-active {
  color: #fff;
  border-color: rgba(139, 197, 255, 0.8);
  background: rgba(27, 53, 106, 0.75);
  box-shadow:
    0 0 0 4px rgba(103, 171, 255, 0.09),
    0 14px 34px rgba(4, 7, 25, 0.45),
    0 0 32px rgba(78, 135, 255, 0.24);
  outline: none;
  transform: translateY(-3px);
}
.kb-context-signal::after {
  position: absolute;
  z-index: -1;
  width: 1px;
  height: 70px;
  opacity: 0;
  background:
    linear-gradient(
      180deg,
      rgba(130, 210, 255, 0),
      rgba(130, 210, 255, 0.95),
      rgba(160, 120, 255, 0));
  content: "";
  transition: opacity 180ms ease;
}
.kb-context-signal.is-active::after {
  opacity: 1;
  animation: kb-trace-pulse 1.6s ease-in-out infinite;
}
.kb-context-signal > span:last-child {
  display: grid;
  gap: 3px;
}
.kb-context-signal strong {
  font-size: 9px;
  font-weight: 720;
  line-height: 1.08;
}
.kb-context-signal small {
  color: rgba(191, 210, 250, 0.55);
  font-family: var(--mono);
  font-size: 6px;
  letter-spacing: 0.035em;
  line-height: 1.25;
}
.kb-context-signal-dot {
  width: 8px;
  height: 8px;
  flex: 0 0 auto;
  border-radius: 50%;
  background: #a88cff;
  box-shadow: 0 0 0 4px rgba(168, 140, 255, 0.12), 0 0 16px rgba(168, 140, 255, 0.8);
}
.kb-context-signal--meeting {
  top: 2%;
  left: 28%;
}
.kb-context-signal--meeting::after {
  top: calc(100% + 4px);
  left: 50%;
  transform: rotate(-28deg);
  transform-origin: top;
}
.kb-context-signal--conversation {
  top: 19%;
  right: 0;
}
.kb-context-signal--conversation::after {
  top: 54%;
  left: -26px;
  transform: rotate(58deg);
  transform-origin: top;
}
.kb-context-signal--files {
  right: 0;
  bottom: 23%;
}
.kb-context-signal--files::after {
  top: -32px;
  left: -22px;
  transform: rotate(122deg);
  transform-origin: top;
}
.kb-context-signal--moments {
  bottom: 1%;
  left: 36%;
}
.kb-context-signal--moments::after {
  right: 50%;
  bottom: calc(100% + 4px);
  transform: rotate(27deg);
  transform-origin: bottom;
}

    grid-template-rows: auto auto minmax(410px, 1fr) auto auto;
  }
  .return-external-panel {
    right: 15%;
    width: 300px;
  }
  .return-book-world {
    left: 31%;
  }
  .return-loop-stage::before {
    left: 31%;
  }
}
@media (max-width: 720px) {
  .context-return-loop-shell {
    grid-template-rows: auto auto auto auto auto;
  }
  .context-return-loop-header {
    align-items: start;
    flex-direction: column;
    gap: 8px;
  }
  .context-return-loop-header > p {
    max-width: 420px;
  }
  .return-step-track {
    gap: 5px;
  }
  .return-step-track::before {
    right: 7%;
    left: 7%;
  }
  .return-step-track button {
    min-height: 68px;
    grid-template-columns: 1fr;
    grid-template-rows: auto auto auto;
    gap: 2px;
    padding: 8px;
    text-align: center;
  }
  .return-step-track b {
    grid-row: auto;
    justify-self: center;
    width: 23px;
    height: 23px;
    font-size: 7px;
  }
  .return-step-track strong {
    font-size: 9px;
  }
  .return-step-track small {
    font-size: 5px;
  }
  .return-loop-stage {
    min-height: 690px;
    overflow: visible;
  }
  .return-loop-stage::before {
    top: 31%;
    left: 50%;
    width: 310px;
  }
  .return-book-world {
    top: 37%;
    left: 50%;
    transform: translate(-50%, -50%);
  }
  .return-external-panel {
    top: 9px;
    right: 50%;
    width: min(84%, 330px);
    transform: translate(50%, 0);
  }
  .return-phone {
    right: 50%;
    bottom: 14px;
    transform: translateX(50%);
  }
  .return-flight-path {
    top: -44px;
    right: 50%;
    width: 1px;
    height: 48px;
    background:
      linear-gradient(
        180deg,
        rgba(220, 171, 82, .12),
        rgba(220, 171, 82, .72),
        rgba(62, 163, 207, .12));
  }
  .return-flight-path i {
    margin: 0 0 0 -2px;
  }
  .context-return-loop-shell[data-returned] .return-external-panel {
    transform: translate(50%, 0) scale(.93);
  }
  .context-return-loop-shell[data-returned] .return-phone {
    transform: translate(50%, -4px);
  }
  .return-loop-footer {
    align-items: stretch;
    flex-direction: column;
    gap: 9px;
  }
  .return-privacy-note {
    width: 100%;
    justify-content: space-between;
  }
  .return-action-area {
    justify-content: start;
  }
  .return-remember-button {
    width: 100%;
    justify-items: center;
    text-align: center;
  }
  .return-complete-copy {
    justify-content: center;
    width: 100%;
  }
}
.return-book-cover-image {
  position: absolute;
  z-index: 0;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.return-living-book::after {
  position: absolute;
  z-index: 1;
  inset: 0;
  background:
    linear-gradient(
      180deg,
      rgba(12, 59, 87, 0.06),
      rgba(12, 49, 79, 0.88));
  content: "";
}
.return-living-book > span,
.return-living-book > strong,
.return-living-book > small,
.return-living-book > .return-book-spine {
  position: relative;
  z-index: 2;
}
@media (min-width: 721px) and (max-height: 780px) {
  .expression-composer-shell {
    grid-template-rows: auto minmax(350px, 1fr) auto;
    gap: 10px;
  }
}

/* app/globals.css */
:root {
  --canvas: #fafcff;
  --surface: #ffffff;
  --surface-soft: #f5f7fb;
  --surface-blue: #f6f9ff;
  --navy: #2d3a5c;
  --body: #475569;
  --muted: #637083;
  --blue: #8e9cc7;
  --periwinkle: #a8b4d9;
  --mint: #7ecba1;
  --electric-blue: #2864f5;
  --violet: #b329f3;
  --border: #dde6ff;
  --border-soft: #e8eef7;
  --shadow: rgba(45, 58, 92, 0.1);
  --sans:
    "DM Sans",
    "Plus Jakarta Sans",
    -apple-system,
    BlinkMacSystemFont,
    "SF Pro Text",
    "PingFang SC",
    "Helvetica Neue",
    Arial,
    sans-serif;
  --serif:
    Lora,
    "DM Serif Display",
    "Iowan Old Style",
    "Songti SC",
    Georgia,
    serif;
  --mono:
    "SFMono-Regular",
    "SF Mono",
    Menlo,
    Monaco,
    Consolas,
    monospace;
}
* {
  box-sizing: border-box;
}
html,
body {
  width: 100%;
  height: 100%;
  overflow: hidden;
}
html {
  background: var(--canvas);
}
body {
  min-width: 320px;
  margin: 0;
  color: var(--navy);
  background: var(--canvas);
  font-family: var(--sans);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
button {
  color: inherit;
  font: inherit;
}
button:focus-visible {
  outline: 2px solid var(--blue);
  outline-offset: 4px;
}
::selection {
  color: #fff;
  background: var(--navy);
}
.framework-shell {
  position: relative;
  height: 100svh;
  min-width: 0;
  overflow: hidden;
  background:
    radial-gradient(
      circle at 74% 13%,
      rgba(40, 100, 245, 0.08),
      transparent 24%),
    radial-gradient(
      circle at 82% 28%,
      rgba(179, 41, 243, 0.055),
      transparent 25%),
    var(--canvas);
}
.framework-shell::before {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  content: "";
  opacity: 0.5;
  background-image:
    linear-gradient(rgba(142, 156, 199, 0.07) 1px, transparent 1px),
    linear-gradient(
      90deg,
      rgba(142, 156, 199, 0.07) 1px,
      transparent 1px);
  background-size: 64px 64px;
  mask-image:
    radial-gradient(
      circle at 68% 35%,
      #000 0,
      rgba(0, 0, 0, 0.72) 34%,
      transparent 78%);
}
.scroll-progress {
  position: fixed;
  z-index: 120;
  inset: 0 0 auto;
  height: 3px;
  background: rgba(142, 156, 199, 0.14);
}
.scroll-progress span {
  display: block;
  height: 100%;
  background: var(--blue);
  transition: width 100ms linear;
}
.top-nav {
  position: fixed;
  z-index: 100;
  top: 0;
  right: 0;
  left: 0;
  height: 76px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 26px 0 20px;
  border-bottom: 1px solid rgba(221, 230, 255, 0.9);
  background: rgba(250, 252, 255, 0.92);
  backdrop-filter: blur(20px) saturate(145%);
}
.brand-lockup {
  display: flex;
  align-items: center;
  gap: 15px;
  min-width: 0;
  color: var(--navy);
  font-size: 9px;
  font-weight: 750;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.official-logo {
  width: 78px;
  height: 56px;
  object-fit: contain;
}
.demo-duration {
  color: var(--muted);
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.book-layout {
  position: relative;
  z-index: 1;
  height: 100svh;
  display: grid;
  grid-template-columns: 188px minmax(0, 1fr);
  padding-top: 76px;
}
.page-spine {
  min-width: 0;
  height: calc(100svh - 76px);
  display: flex;
  flex-direction: column;
  padding: 27px 24px 28px 30px;
  border-right: 1px solid rgba(142, 156, 199, 0.28);
  background: rgba(245, 247, 251, 0.54);
}
.spine-kicker {
  margin: 0 0 19px;
  color: var(--muted);
  font-family: var(--mono);
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
}
.spine-list {
  display: grid;
  margin: 0;
  padding: 0;
  list-style: none;
}
.spine-list li {
  position: relative;
  color: rgba(99, 112, 131, 0.72);
  border-bottom: 1px solid rgba(142, 156, 199, 0.18);
  transition: color 180ms ease, transform 180ms ease;
}
.spine-list li button {
  width: 100%;
  display: grid;
  grid-template-columns: 28px minmax(0, 1fr);
  align-items: baseline;
  padding: 10px 0;
  color: inherit;
  border: 0;
  background: transparent;
  cursor: pointer;
  text-align: left;
}
.spine-list li button:hover {
  color: var(--navy);
}
.spine-list li::before {
  position: absolute;
  top: 50%;
  left: -30px;
  width: 3px;
  height: 0;
  border-radius: 999px;
  background: var(--blue);
  content: "";
  transform: translateY(-50%);
  transition: height 180ms ease;
}
.spine-list li button span {
  font-family: var(--mono);
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 0.08em;
}
.spine-list li button strong {
  font-size: 10px;
  font-weight: 550;
  line-height: 1.25;
}
.spine-list li.is-active {
  color: var(--navy);
  transform: translateX(4px);
}
.spine-list li.is-active::before {
  height: 24px;
}
.spine-list li.is-complete {
  color: var(--blue);
}
.folio {
  display: grid;
  gap: 7px;
  margin-top: auto;
  padding-top: 22px;
  border-top: 1px solid rgba(142, 156, 199, 0.3);
}
.folio span {
  color: var(--blue);
  font-family: var(--mono);
  font-size: 27px;
  line-height: 1;
}
.folio strong {
  font-family: var(--serif);
  font-size: 17px;
  font-weight: 500;
  line-height: 1.15;
}
.folio small {
  color: var(--muted);
  font-family: var(--mono);
  font-size: 8px;
  letter-spacing: 0.08em;
}
.chapter-scroll {
  min-width: 0;
  height: calc(100svh - 76px);
  overflow-x: hidden;
  overflow-y: auto;
  overscroll-behavior: contain;
  scroll-behavior: smooth;
  scroll-snap-type: y proximity;
  scrollbar-color: rgba(142, 156, 199, 0.62) transparent;
  scrollbar-width: thin;
}
.chapter-scroll::-webkit-scrollbar {
  width: 8px;
}
.chapter-scroll::-webkit-scrollbar-track {
  background: transparent;
}
.chapter-scroll::-webkit-scrollbar-thumb {
  border-radius: 999px;
  background: rgba(142, 156, 199, 0.48);
}
.knowledge-chapter {
  min-width: 0;
}
.kb-convergence-beat {
  background:
    radial-gradient(
      circle at 50% 58%,
      rgba(40, 100, 245, 0.08),
      transparent 27%),
    var(--canvas);
}
.kb-convergence {
  width: min(100%, 920px);
  flex: 1;
  min-height: 0;
  display: grid;
  align-content: center;
  gap: 30px;
  margin: 0 auto;
}
.kb-convergence h1 {
  max-width: 850px;
  margin: 0 auto;
  color: var(--navy);
  font-family: var(--serif);
  font-size: clamp(42px, 4.7vw, 64px);
  font-weight: 420;
  letter-spacing: -0.045em;
  line-height: 0.98;
  text-align: center;
}
.kb-flow {
  width: min(100%, 860px);
  display: grid;
  grid-template-rows: 64px 44px 34px 44px 64px;
  align-items: center;
  margin: 0 auto;
}
.kb-flow-row {
  display: grid;
  gap: 14px;
}
.kb-flow-inputs {
  grid-template-columns: repeat(3, minmax(0, 1fr));
}
.kb-flow-outcomes {
  grid-template-columns: repeat(4, minmax(0, 1fr));
}
.kb-flow-row div {
  height: 64px;
  display: grid;
  place-items: center;
  padding: 0 14px;
  border: 1px solid var(--border);
  border-radius: 15px;
  background: rgba(255, 255, 255, 0.9);
  box-shadow: 0 10px 28px rgba(45, 58, 92, 0.06);
  font-size: 11px;
  font-weight: 720;
  letter-spacing: 0.01em;
  text-align: center;
}
.kb-flow-inputs div {
  color: var(--body);
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.kb-flow-outcomes div {
  color: var(--navy);
  border-color: rgba(140, 151, 217, 0.48);
  background:
    linear-gradient(
      145deg,
      rgba(255, 255, 255, 0.98),
      rgba(246, 248, 255, 0.94));
}
.kb-flow-merge,
.kb-flow-split {
  position: relative;
  height: 44px;
  justify-self: center;
}
.kb-flow-merge {
  width: 66.666%;
}
.kb-flow-split {
  width: 75%;
}
.kb-flow-merge::before,
.kb-flow-split::before {
  position: absolute;
  right: 0;
  left: 0;
  height: 1px;
  background:
    linear-gradient(
      90deg,
      var(--periwinkle),
      #735af0,
      var(--periwinkle));
  content: "";
}
.kb-flow-merge::before {
  top: 9px;
}
.kb-flow-split::before {
  bottom: 9px;
}
.kb-flow-merge span,
.kb-flow-split span,
.kb-flow-merge i,
.kb-flow-split i {
  position: absolute;
  width: 1px;
  display: block;
  background:
    linear-gradient(
      180deg,
      var(--periwinkle),
      #735af0);
}
.kb-flow-merge span {
  top: -12px;
  height: 22px;
}
.kb-flow-merge span:nth-child(1) {
  left: 0;
}
.kb-flow-merge span:nth-child(2) {
  left: 50%;
}
.kb-flow-merge span:nth-child(3) {
  right: 0;
}
.kb-flow-merge i {
  top: 9px;
  left: 50%;
  height: 35px;
}
.kb-flow-core {
  position: relative;
  z-index: 1;
  width: 34px;
  height: 34px;
  display: grid;
  place-items: center;
  justify-self: center;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.96);
  box-shadow: 0 0 0 8px rgba(111, 93, 229, 0.08), 0 14px 30px rgba(77, 70, 180, 0.18);
}
.kb-flow-core span {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background:
    linear-gradient(
      135deg,
      var(--electric-blue),
      var(--violet));
}
.kb-flow-split i {
  bottom: 9px;
  left: 50%;
  height: 35px;
  background:
    linear-gradient(
      180deg,
      #735af0,
      var(--periwinkle));
}
.kb-flow-split span {
  bottom: -12px;
  height: 22px;
  background:
    linear-gradient(
      180deg,
      #735af0,
      var(--periwinkle));
}
.kb-flow-split span:nth-of-type(1) {
  left: 0;
}
.kb-flow-split span:nth-of-type(2) {
  left: 33.333%;
}
.kb-flow-split span:nth-of-type(3) {
  left: 66.666%;
}
.kb-flow-split span:nth-of-type(4) {
  right: 0;
}
.kb-recording-beat {
  background:
    radial-gradient(
      circle at 50% 52%,
      rgba(40, 100, 245, 0.075),
      transparent 26%),
    linear-gradient(
      180deg,
      #f8faff,
      var(--canvas));
}
.kb-recording-stage {
  position: relative;
  flex: 1;
  min-height: 0;
  display: grid;
  place-items: center;
}
.kb-recording-stage .recording-column {
  width: min(100%, 360px);
  align-content: center;
}
.kb-recording-stage .recording-frame video {
  height: min(620px, calc(100svh - 180px));
}
.kb-recording-caption {
  position: absolute;
  top: 2px;
  color: var(--muted);
  font-family: var(--mono);
  font-size: 8px;
  font-weight: 740;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.kb-recording-caption--left {
  left: 0;
}
.kb-recording-caption--right {
  right: 0;
}
.kb-case-beat {
  background:
    radial-gradient(
      circle at 50% 50%,
      rgba(111, 93, 229, 0.08),
      transparent 30%),
    var(--canvas);
}
.kb-case-stage {
  position: relative;
  flex: 1;
  min-height: 0;
  display: grid;
  place-items: center;
}
.kb-tail-frame {
  width: fit-content;
  padding: 7px;
  overflow: hidden;
  border: 1px solid var(--border);
  border-radius: 28px;
  background: #fff;
  box-shadow: 0 24px 60px rgba(45, 58, 92, 0.16);
}
.kb-tail-frame img {
  width: auto;
  height: min(420px, calc(100svh - 300px));
  display: block;
  border-radius: 22px;
}
.kb-case-copy {
  position: absolute;
  top: 50%;
  left: calc(50% + 160px);
  width: min(32vw, 330px);
  transform: translateY(-50%);
}
.kb-case-copy h2 {
  margin: 0;
  color: var(--navy);
  font-family: var(--serif);
  font-size: clamp(38px, 4vw, 56px);
  font-weight: 420;
  letter-spacing: -0.04em;
  line-height: 0.98;
}
.kb-case-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin: 17px 0 0;
  padding: 0 0 5px;
  color: var(--muted);
  border: 0;
  border-bottom: 1px solid rgba(99, 112, 131, 0.38);
  background: transparent;
  cursor: pointer;
  font-size: 12px;
  text-align: left;
  transition: color 160ms ease, border-color 160ms ease;
}
.kb-case-link svg {
  width: 16px;
  height: 16px;
  flex: 0 0 auto;
  transition: transform 160ms ease;
}
.kb-case-link path {
  stroke: currentColor;
  stroke-width: 1.65;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.kb-case-link:hover {
  color: var(--electric-blue);
  border-color: var(--electric-blue);
}
.kb-case-link:hover svg {
  transform: translateX(3px);
}
.chapter-beat {
  position: relative;
  min-height: calc(100svh - 76px);
  display: flex;
  flex-direction: column;
  padding: 30px clamp(36px, 5.2vw, 76px) 28px;
  scroll-snap-align: start;
}
.beat-meta {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 24px;
  margin-bottom: 24px;
}
.beat-meta p,
.beat-meta time {
  margin: 0;
  color: var(--muted);
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.beat-meta.compact {
  margin-bottom: 16px;
}
.intro-layout {
  flex: 1;
  min-height: 0;
  display: grid;
  grid-template-columns: minmax(0, 1.04fr) minmax(390px, 0.96fr);
  align-items: center;
  gap: clamp(34px, 4.4vw, 64px);
}
.intro-copy {
  min-width: 0;
  animation: chapter-reveal 560ms ease-out both;
}
.adoption-signal {
  width: fit-content;
  display: flex;
  align-items: center;
  gap: 11px;
  margin-bottom: 18px;
  padding: 8px 13px 8px 10px;
  border: 1px solid rgba(142, 156, 199, 0.34);
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.76);
  box-shadow: 0 8px 22px rgba(45, 58, 92, 0.06);
}
.adoption-signal strong {
  color: var(--electric-blue);
  font-size: 19px;
  font-weight: 780;
  letter-spacing: -0.04em;
}
.adoption-signal span {
  max-width: 240px;
  color: var(--muted);
  font-family: var(--mono);
  font-size: 7px;
  font-weight: 700;
  letter-spacing: 0.04em;
  line-height: 1.35;
  text-transform: uppercase;
}
.intro-copy h1 {
  max-width: 690px;
  margin: 0;
  color: var(--navy);
  font-family: var(--serif);
  font-size: clamp(40px, 4.55vw, 64px);
  font-weight: 400;
  letter-spacing: -0.045em;
  line-height: 0.96;
}
.intro-copy h1 span,
.intro-copy h1 strong {
  display: block;
}
.intro-copy h1 strong {
  margin-top: 6px;
  color: transparent;
  background:
    linear-gradient(
      92deg,
      var(--electric-blue) 0%,
      #5d55f6 53%,
      var(--violet) 100%);
  background-clip: text;
  font-family: var(--sans);
  font-size: 0.91em;
  font-weight: 760;
  letter-spacing: -0.055em;
  line-height: 0.98;
  -webkit-background-clip: text;
}
.intro-summary {
  max-width: 610px;
  margin: 24px 0 0;
  color: var(--body);
  font-size: 14px;
  line-height: 1.65;
}
.hero-principles {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin: 29px 0 0;
  padding: 0;
  list-style: none;
}
.hero-principles li {
  padding: 8px 11px;
  color: var(--navy);
  border: 1px solid rgba(221, 230, 255, 0.95);
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.78);
  box-shadow: 0 6px 18px rgba(45, 58, 92, 0.04);
  font-size: 8px;
  font-weight: 680;
  letter-spacing: 0.01em;
}
.alignment-preview {
  position: relative;
  min-width: 0;
  display: grid;
  gap: 10px;
  padding: 18px;
  border: 1px solid rgba(221, 230, 255, 0.96);
  border-radius: 26px;
  background:
    linear-gradient(
      145deg,
      rgba(255, 255, 255, 0.95),

  padding: 15px;
  border: 1px solid var(--border);
  border-radius: 16px;
  background: rgba(255, 255, 255, 0.94);
  box-shadow: 0 12px 28px rgba(45, 58, 92, 0.08);
}
.context-source-card span,
.ask-context-card span {
  color: #6d65da;
  font-family: var(--mono);
  font-size: 7px;
  font-weight: 750;
  letter-spacing: 0.09em;
  text-transform: uppercase;
}
.context-source-card strong,
.ask-context-card strong {
  color: var(--navy);
  font-size: 10px;
  font-weight: 700;
}
.provenance-lines {
  position: relative;
  width: 67%;
  opacity: 0;
  transition: opacity 260ms ease;
}
.provenance-beat.is-open .provenance-lines {
  opacity: 1;
}
.provenance-lines::before {
  position: absolute;
  top: 14px;
  right: 0;
  left: 0;
  height: 1px;
  background: var(--periwinkle);
  content: "";
}
.provenance-lines::after {
  position: absolute;
  top: 14px;
  bottom: 0;
  left: 50%;
  width: 1px;
  background: var(--periwinkle);
  content: "";
}
.provenance-lines span {
  position: absolute;
  top: 0;
  width: 1px;
  height: 15px;
  background: var(--periwinkle);
}
.provenance-lines span:nth-child(1) {
  left: 0;
}
.provenance-lines span:nth-child(2) {
  left: 50%;
}
.provenance-lines span:nth-child(3) {
  right: 0;
}
.provenance-page {
  width: min(100%, 520px);
  display: grid;
  align-content: start;
  justify-items: center;
  gap: 12px;
}
.provenance-page .page-miniature {
  width: 100%;
  grid-template-columns: 170px minmax(0, 1fr);
  min-height: 138px;
}
.provenance-link {
  padding: 0;
  color: #4f5ec8;
  border: 0;
  border-bottom: 1px solid currentColor;
  background: transparent;
  cursor: pointer;
  font-size: 10px;
  font-weight: 750;
}
.provenance-caption {
  display: flex;
  align-items: baseline;
  justify-content: center;
  gap: 12px;
  margin-top: 12px;
}
.provenance-caption span {
  color: var(--muted);
  font-family: var(--mono);
  font-size: 7px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.provenance-caption strong {
  color: var(--navy);
  font-family: var(--serif);
  font-size: 21px;
  font-weight: 450;
}
.match-cut-beat {
  background:
    linear-gradient(rgba(142, 156, 199, 0.07) 1px, transparent 1px),
    linear-gradient(
      90deg,
      rgba(142, 156, 199, 0.07) 1px,
      transparent 1px),
    var(--canvas);
  background-size: 42px 42px;
}
.match-cut-copy {
  max-width: 820px;
  margin: 0 auto 30px;
  text-align: center;
}
.match-cut-copy h2 {
  font-size: clamp(40px, 4.4vw, 60px);
}
.match-cut-copy p {
  margin-right: auto;
  margin-left: auto;
}
.match-cut-context {
  flex: 1;
  min-height: 0;
  width: min(100%, 840px);
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  grid-template-rows: repeat(6, 1fr);
  gap: 12px;
  margin: 0 auto;
}
.ask-context-card {
  min-height: 110px;
}
.ask-context-card small {
  color: var(--muted);
  font-size: 7px;
}
.ask-context-card--note {
  grid-column: 1 / 6;
  grid-row: 1 / 4;
}
.ask-context-card--project {
  grid-column: 7 / 13;
  grid-row: 1 / 4;
}
.ask-context-card--pages {
  grid-column: 4 / 10;
  grid-row: 4 / 7;
}
.alignment-recording-beat .concept-heading {
  position: absolute;
  z-index: 4;
  top: 50%;
  left: clamp(36px, 5.2vw, 76px);

}

}
.alignment-recording-beat .concept-heading p {

}
.alignment-recording-beat .recording-column {

}
.context-return-beat {

    radial-gradient(

      transparent 30%),

}
.context-return-layout {
  flex: 1;
  min-height: 0;

  align-items: center;
  gap: 52px;
}

}

  padding: 8px 11px;

  border-radius: 999px;
  background: rgba(234, 251, 241, 0.9);
  font-family: var(--mono);
  font-size: 7px;
  font-weight: 750;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.context-updated-status i {

      circle at 70% 42%,

.final-frame-layout {

  min-height: 0;

}

}
.final-context-orbits span {
  position: absolute;
  border: 1px solid rgba(111, 93, 229, 0.24);
  border-radius: 50%;
}
.final-context-orbits span:nth-child(1) {
  inset: -18px -24px;
}
.final-context-orbits span:nth-child(2) {
  inset: -34px -52px;
}
.final-context-orbits span:nth-child(3) {

}
.final-copy h1 {

}
.final-copy p {

    linear-gradient(

@keyframes chapter-reveal {

}

/* app/brand-unification.css */
:root {
  --brand-canvas: #fafcff;
  --brand-surface: #ffffff;
  --brand-soft: #f6f9ff;
  --brand-ink: #2d3a5c;
  --brand-body: #475569;
  --brand-muted: #637083;
  --brand-periwinkle: #8e9cc7;
  --brand-periwinkle-soft: #a8b4d9;
  --brand-blue: #2864f5;
  --brand-violet: #b329f3;
  --brand-mint: #7ecba1;
  --brand-warm: #d3a14b;
  --brand-border: #dde6ff;
  --brand-border-soft: #e8eef7;
  --brand-shadow: rgba(45, 58, 92, 0.1);
  --brand-gradient:
    linear-gradient(
      135deg,
      #2864f5 0%,
      #6a54f5 56%,
      #b329f3 100%);
  --brand-wash:
    radial-gradient(
      circle at 82% 15%,
      rgba(179, 41, 243, 0.045),
      transparent 28%),
    radial-gradient(
      circle at 15% 82%,
      rgba(40, 100, 245, 0.07),
      transparent 32%),
    linear-gradient(
      135deg,
      #fafcff 0%,
      #f6f9ff 56%,
      #ffffff 100%);
}
.scroll-progress span {
  background: var(--brand-gradient);
}
.spine-list li::before {
  background: var(--brand-gradient);
}
.top-nav {
  border-bottom-color: rgba(221, 230, 255, 0.92);
  background: rgba(250, 252, 255, 0.92);
}
.page-spine {
  border-right-color: rgba(142, 156, 199, 0.28);
  background: rgba(246, 249, 255, 0.72);
}
.recording-frame,
.recording-placeholder {
  border-color: var(--brand-border);
  background: var(--brand-surface);
  box-shadow: 0 24px 60px rgba(45, 58, 92, 0.14);
}
.recording-control {
  color: var(--brand-ink);
  border-color: rgba(142, 156, 199, 0.34);
  background: rgba(255, 255, 255, 0.94);
}
.recording-control:hover {
  border-color: rgba(40, 100, 245, 0.48);
  box-shadow: 0 8px 24px rgba(45, 58, 92, 0.12);
}
.kb-convergence-beat,
.kb-recording-beat,
.kb-case-beat,
.note-morph-beat,
.note-recording-beat,
.output-single-recording-beat,
.expression-composer-beat,
.context-return-loop-beat,
.alignment-recording-beat,
.end-beat {
  color: var(--brand-ink);
  background: var(--brand-wash);
}
.kb-convergence-beat,
.kb-recording-beat,
.kb-case-beat {
  color: var(--brand-ink) !important;
  background: var(--brand-wash) !important;
}

/* app/scroll-stories.css */
.scroll-driven-story {
  --scroll-story-viewport: calc(100svh - 76px);
  position: relative;
  scroll-snap-align: start;
}
.scroll-driven-story--three {
  height: calc(var(--scroll-story-viewport) + var(--scroll-story-viewport) + var(--scroll-story-viewport));
  min-height: 1500px;
}
.scroll-driven-story--four {
  height: calc(var(--scroll-story-viewport) + var(--scroll-story-viewport) + var(--scroll-story-viewport) + var(--scroll-story-viewport));
  min-height: 2000px;
}
.scroll-driven-story > .concept-beat {
  position: sticky;
  top: 0;
  height: var(--scroll-story-viewport);
  min-height: var(--scroll-story-viewport);
  scroll-snap-align: none;
}
@keyframes scroll-state-fade {
  from {
    opacity: 0.35;
    filter: blur(5px);
  }
  to {
    opacity: 1;
    filter: blur(0);
  }
}
.scroll-state-enter {
  animation: scroll-state-fade 420ms cubic-bezier(0.2, 0.75, 0.2, 1);
}

  transform: translate(-50%, -50%);
}
.note-morph-progress-track::before {
  left: 30%;
}
.note-morph-progress-track::after {
  left: 66%;
}
.note-morph-progress-track > span {
  display: block;
  height: 100%;
  border-radius: inherit;
  background: var(--brand-gradient);
  transition: width 100ms linear;
}
.expression-composer-option,
.expression-composer-share {
  cursor: default;
}
.expression-composer-footer > .expression-composer-share span {
  color: rgba(255, 255, 255, 0.78);
}
.expression-composer-footer > .expression-composer-share strong {
  color: #fff;
}
.expression-composer-shell[data-shared] .expression-composer-share {
  background:
    linear-gradient(
      135deg,
      #3667e8,
      #8c43de);
  box-shadow: 0 0 0 5px rgba(40, 100, 245, 0.07), 0 15px 32px rgba(40, 100, 245, 0.25);
}
.return-step-track {
  margin: 0;
  padding: 0;
  list-style: none;
}
.return-step-track li {
  position: relative;
  z-index: 1;
  min-height: 63px;
  display: grid;
  grid-template-columns: auto 1fr;
  grid-template-rows: auto auto;
  align-items: center;
  column-gap: 8px;
  padding: 10px 14px;
  color: var(--brand-muted);
  border: 1px solid var(--brand-border);
  border-radius: 16px;
  background: rgba(255, 255, 255, 0.84);
  box-shadow: 0 8px 21px rgba(45, 58, 92, 0.06);
  text-align: left;
  transition:
    color 240ms ease,
    border-color 240ms ease,
    background 240ms ease,
    box-shadow 240ms ease;
}
.return-step-track li.is-active {
  color: var(--brand-ink);
  border-color: rgba(40, 100, 245, 0.44);
  background:
    linear-gradient(
      135deg,
      #f1f5ff,
      #ffffff);
  box-shadow: 0 0 0 4px rgba(40, 100, 245, 0.07), 0 13px 27px rgba(45, 58, 92, 0.1);
}
.return-privacy-note,
.return-remember-button {
  cursor: default;
}
.return-remember-button:hover {
  transform: none;
}
.return-scroll-copy {
  color: var(--brand-periwinkle);
  font-family: var(--mono);
  font-size: 7px;
  font-weight: 750;
}
@media (max-width: 820px) {
  .scroll-driven-story {
    --scroll-story-viewport: calc(100svh - 64px);
  }
}
@media (max-width: 720px) {
  .return-step-track li {
    min-height: 68px;
    grid-template-columns: 1fr;
    grid-template-rows: auto auto auto;
    gap: 2px;
    padding: 8px;
    text-align: center;
  }
}
@media (max-width: 620px) {
  .expression-composer-guide {
    left: 50%;
    width: calc(100% - 32px);
  }
  .expression-composer-guide strong {
    white-space: normal;
  }
}
@media (prefers-reduced-motion: reduce) {
  .scroll-driven-story,
  .scroll-driven-story--three,
  .scroll-driven-story--four {
    height: var(--scroll-story-viewport);
    min-height: var(--scroll-story-viewport);
  }
  .scroll-driven-story > .concept-beat {
    position: relative;
  }
  .scroll-state-enter {
    animation: none;
  }
  .note-morph-progress-track > span {
    transition: none;
  }
}
